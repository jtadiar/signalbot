name: Build Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: Tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            label: macOS-universal
            bundles: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
            bundles: nsis

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          npm install
          cd bot && npm install --omit=dev && cd ..

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          npm install
          cd bot
          npm install --omit=dev
          cd ..

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Download Node.js sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          NODE_VER=$(node --version)
          mkdir -p src-tauri/binaries
          curl -sL "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-darwin-arm64.tar.gz" \
            | tar xz --strip-components=2 -C /tmp "node-${NODE_VER}-darwin-arm64/bin/node"
          mv /tmp/node src-tauri/binaries/node-arm64
          curl -sL "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-darwin-x64.tar.gz" \
            | tar xz --strip-components=2 -C /tmp "node-${NODE_VER}-darwin-x64/bin/node"
          mv /tmp/node src-tauri/binaries/node-x64
          lipo -create src-tauri/binaries/node-arm64 src-tauri/binaries/node-x64 \
            -output src-tauri/binaries/node-universal-apple-darwin
          rm src-tauri/binaries/node-arm64 src-tauri/binaries/node-x64
          chmod +x src-tauri/binaries/node-universal-apple-darwin
          ls -lh src-tauri/binaries/

      - name: Download Node.js sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $NODE_VER = (node --version)
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $url = "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node-win.zip
          Expand-Archive -Path node-win.zip -DestinationPath node-extract -Force
          Copy-Item "node-extract/node-$NODE_VER-win-x64/node.exe" "src-tauri/binaries/node-x86_64-pc-windows-msvc.exe"
          Remove-Item node-win.zip, node-extract -Recurse -Force
          Get-ChildItem src-tauri/binaries/

      - name: Bundle bot node_modules (macOS)
        if: runner.os == 'macOS'
        run: |
          cd bot
          tar czf node_modules.tar.gz node_modules
          ls -lh node_modules.tar.gz

      - name: Bundle bot node_modules (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd bot
          tar czf node_modules.tar.gz node_modules
          Get-ChildItem node_modules.tar.gz

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          rm certificate.p12

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: HL-Signalbot-${{ matrix.label }}
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: HL-Signalbot-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
