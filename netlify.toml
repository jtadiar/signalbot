[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Old versioned download URLs → redirect to stable route handlers
[[redirects]]
  from = "/downloads/HL.Signalbot_*_universal.dmg"
  to = "/download/mac"
  status = 302

[[redirects]]
  from = "/downloads/HL.Signalbot_*_x64-setup.exe"
  to = "/download/windows"
  status = 302
