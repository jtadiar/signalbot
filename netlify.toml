[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Stable download redirects → route handlers that resolve to current version
[[redirects]]
  from = "/downloads/signalbot-mac.dmg"
  to = "/download/mac"
  status = 302
  force = true

[[redirects]]
  from = "/downloads/signalbot-windows.exe"
  to = "/download/windows"
  status = 302
  force = true

[[redirects]]
  from = "/downloads/HL.Signalbot_*_universal.dmg"
  to = "/download/mac"
  status = 302

[[redirects]]
  from = "/downloads/HL.Signalbot_*_x64-setup.exe"
  to = "/download/windows"
  status = 302
